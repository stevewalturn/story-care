name: Deploy to Development

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  SERVICE_NAME: storycare-app-dev

jobs:
  deploy:
    name: Deploy to Cloud Run (Development)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: |
          cat > .env.build << 'EOF'
          ${{ secrets.ENV_FILE_DEV }}
          EOF

      - name: Authenticate to Google Cloud (Dev)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            --build-arg ENV_FILE="$(cat .env.build)" \
            -t us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID_DEV }}/gcr.io/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID_DEV }}/gcr.io/${{ env.SERVICE_NAME }}:dev-latest \
            .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID_DEV }}/gcr.io/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID_DEV }}/gcr.io/${{ env.SERVICE_NAME }}:dev-latest

      - name: Deploy to Cloud Run (Development)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID_DEV }}/gcr.io/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --max-instances 10 \
            --min-instances 0 \
            --port 8080 \
            --add-cloudsql-instances=storycare-dev-479511:us-central1:storycare-dev \
            --set-env-vars "NODE_ENV=development" \
            --update-secrets=DATABASE_URL=DATABASE_URL_DEV:latest \
            --timeout 300 \
            --body-size-limit 524288000 \
            --concurrency 80

      - name: Get service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Development Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** $SERVICE_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** gcr.io/${{ secrets.GCP_PROJECT_ID_DEV }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        run: |
          echo "Waiting for service to be ready..."
          sleep 15
          SERVICE_URL="${{ steps.get-url.outputs.SERVICE_URL }}"

          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s "${SERVICE_URL}/api/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Health check attempt $RETRY_COUNT/$MAX_RETRIES failed. Retrying in 10 seconds..."
            sleep 10
          done

          echo "⚠️ Health check failed after $MAX_RETRIES attempts."
          exit 1

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Development deployment completed successfully!"
          else
            echo "❌ Development deployment failed!"
          fi
