name: Deploy Video Processor to Cloud Run (Production)

on:
  push:
    branches:
      - production
    paths:
      - 'jobs/video-processor/**'
      - 'src/services/VideoService.ts'
      - '.github/workflows/deploy-video-processor-prod.yml'
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  SERVICE_NAME: storycare-video-processor

jobs:
  deploy:
    name: Build and Deploy Video Processor to Cloud Run (Prod)
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: |
          cat > .env.build << 'EOF'
          ${{ secrets.ENV_FILE_PROD }}
          EOF

      - name: Authenticate to Google Cloud (Prod)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID_PROD }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Store GCS Private Key in Secret Manager
        run: |
          echo "📝 Updating GCS_PRIVATE_KEY_PROD in Secret Manager..."
          # Create or update the secret
          if gcloud secrets describe GCS_PRIVATE_KEY_PROD --project=${{ secrets.GCP_PROJECT_ID_PROD }} &> /dev/null; then
            echo "${{ secrets.GCS_PRIVATE_KEY_PROD }}" | gcloud secrets versions add GCS_PRIVATE_KEY_PROD \
              --data-file=- \
              --project=${{ secrets.GCP_PROJECT_ID_PROD }}
          else
            echo "${{ secrets.GCS_PRIVATE_KEY_PROD }}" | gcloud secrets create GCS_PRIVATE_KEY_PROD \
              --data-file=- \
              --replication-policy="automatic" \
              --project=${{ secrets.GCP_PROJECT_ID_PROD }}
          fi
          echo "✅ GCS_PRIVATE_KEY_PROD secret updated"

      - name: Build Docker image
        run: |
          docker build \
            -f jobs/video-processor/Dockerfile \
            --build-arg ENV_FILE="$(cat .env.build)" \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID_PROD }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID_PROD }}/${{ env.SERVICE_NAME }}:prod-latest \
            .

      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID_PROD }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID_PROD }}/${{ env.SERVICE_NAME }}:prod-latest

      - name: Create or Update Cloud Run Job
        id: deploy
        run: |
          # Check if job exists
          if gcloud run jobs describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID_PROD }} &> /dev/null; then
            echo "📝 Updating existing Cloud Run Job..."

            gcloud run jobs update ${{ env.SERVICE_NAME }} \
              --image gcr.io/${{ secrets.GCP_PROJECT_ID_PROD }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
              --region ${{ env.GCP_REGION }} \
              --project ${{ secrets.GCP_PROJECT_ID_PROD }} \
              --memory 4Gi \
              --cpu 2 \
              --task-timeout 3600 \
              --max-retries 3 \
              --parallelism 1 \
              --tasks 1 \
              --add-cloudsql-instances=storycare-478114:us-central1:storycare-prod \
              --update-secrets=DATABASE_URL=DATABASE_URL_PROD:latest,GCS_PRIVATE_KEY=GCS_PRIVATE_KEY_PROD:latest \
              --set-env-vars NODE_ENV=production,GCS_PROJECT_ID=${{ secrets.GCS_PROJECT_ID_PROD }},GCS_CLIENT_EMAIL=${{ secrets.GCS_CLIENT_EMAIL_PROD }},GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME_PROD }}
          else
            echo "🆕 Creating new Cloud Run Job..."

            gcloud run jobs create ${{ env.SERVICE_NAME }} \
              --image gcr.io/${{ secrets.GCP_PROJECT_ID_PROD }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
              --region ${{ env.GCP_REGION }} \
              --project ${{ secrets.GCP_PROJECT_ID_PROD }} \
              --memory 4Gi \
              --cpu 2 \
              --task-timeout 3600 \
              --max-retries 3 \
              --parallelism 1 \
              --tasks 1 \
              --add-cloudsql-instances=storycare-478114:us-central1:storycare-prod \
              --update-secrets=DATABASE_URL=DATABASE_URL_PROD:latest,GCS_PRIVATE_KEY=GCS_PRIVATE_KEY_PROD:latest \
              --set-env-vars NODE_ENV=production,GCS_PROJECT_ID=${{ secrets.GCS_PROJECT_ID_PROD }},GCS_CLIENT_EMAIL=${{ secrets.GCS_CLIENT_EMAIL_PROD }},GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME_PROD }}
          fi

      - name: Verify Job Deployment
        run: |
          echo "🔍 Verifying Cloud Run Job deployment..."
          gcloud run jobs describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID_PROD }}

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "🎉 Video Processor Job Deployment Successful! (PROD)"
          echo "=========================================="
          echo ""
          echo "Job Name: ${{ env.SERVICE_NAME }}"
          echo "Region: ${{ env.GCP_REGION }}"
          echo "Image: gcr.io/${{ secrets.GCP_PROJECT_ID_PROD }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo ""
          echo "📋 Job Configuration:"
          echo "   Memory: 4Gi"
          echo "   CPU: 2"
          echo "   Timeout: 3600s (1 hour)"
          echo "   Max Retries: 3"
          echo "   Environment: production"
          echo ""
          echo "📝 Next Steps:"
          echo "   1. Main app will trigger this job via Cloud Run Jobs API"
          echo "   2. Monitor executions: gcloud run jobs executions list --job=${{ env.SERVICE_NAME }}"
          echo ""
          echo "=========================================="

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Video processor deployment (PROD) completed successfully!"
          else
            echo "❌ Video processor deployment (PROD) failed!"
          fi
