# Google Cloud Build Configuration for StoryCare
# This file enables automated deployments from GitHub to Cloud Run
#
# Setup Instructions:
# 1. Connect your GitHub repository to Cloud Build in GCP Console
# 2. Create a build trigger for the main branch
# 3. Ensure all environment variables are stored in Secret Manager
# 4. Grant Cloud Build service account the following roles:
#    - Cloud Run Admin
#    - Service Account User
#    - Secret Manager Secret Accessor

steps:
  # Step 1: Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=$$NEXT_PUBLIC_FIREBASE_APP_ID
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=$$NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
      - --build-arg
      - NEXT_PUBLIC_APP_URL=$$NEXT_PUBLIC_APP_URL
      - --build-arg
      - NEXT_PUBLIC_SENTRY_DSN=$$NEXT_PUBLIC_SENTRY_DSN
      - --build-arg
      - NEXT_PUBLIC_POSTHOG_KEY=$$NEXT_PUBLIC_POSTHOG_KEY
      - --build-arg
      - NEXT_PUBLIC_POSTHOG_HOST=$$NEXT_PUBLIC_POSTHOG_HOST
      - --build-arg
      - NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN=$$NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN
      - --build-arg
      - DATABASE_URL=$$DATABASE_URL
      - -t
      - 'gcr.io/$PROJECT_ID/storycare-app:$COMMIT_SHA'
      - -t
      - 'gcr.io/$PROJECT_ID/storycare-app:latest'
      - .
    secretEnv:
      - NEXT_PUBLIC_FIREBASE_API_KEY
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      - NEXT_PUBLIC_FIREBASE_APP_ID
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
      - NEXT_PUBLIC_APP_URL
      - NEXT_PUBLIC_SENTRY_DSN
      - NEXT_PUBLIC_POSTHOG_KEY
      - NEXT_PUBLIC_POSTHOG_HOST
      - NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN
      - DATABASE_URL

  # Step 2: Push the image to Container Registry
  - name: gcr.io/cloud-builders/docker
    args: [push, 'gcr.io/$PROJECT_ID/storycare-app:$COMMIT_SHA']

  - name: gcr.io/cloud-builders/docker
    args: [push, 'gcr.io/$PROJECT_ID/storycare-app:latest']

  # Step 3: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - storycare-app
      - --image
      - 'gcr.io/$PROJECT_ID/storycare-app:$COMMIT_SHA'
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 4Gi
      - --cpu
      - '2'
      - --timeout
      - '300'
      - --max-instances
      - '10'
      - --min-instances
      - '0'
      - --port
      - '8080'
      - --set-env-vars
      - 'NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,PORT=8080'
      - --update-secrets
      - 'DATABASE_URL=DATABASE_URL:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,GCS_PROJECT_ID=GCS_PROJECT_ID:latest,GCS_CLIENT_EMAIL=GCS_CLIENT_EMAIL:latest,GCS_PRIVATE_KEY=GCS_PRIVATE_KEY:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,SUNO_API_KEY=SUNO_API_KEY:latest,ATLASCLOUD_API_KEY=ATLASCLOUD_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GOOGLE_VERTEX_PROJECT_ID=GOOGLE_VERTEX_PROJECT_ID:latest,GOOGLE_VERTEX_LOCATION=GOOGLE_VERTEX_LOCATION:latest,STABILITY_API_KEY=STABILITY_API_KEY:latest,FLUX_API_KEY=FLUX_API_KEY:latest,REPLICATE_API_TOKEN=REPLICATE_API_TOKEN:latest,ARCJET_KEY=ARCJET_KEY:latest,NEXT_PUBLIC_FIREBASE_API_KEY=NEXT_PUBLIC_FIREBASE_API_KEY:latest,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:latest,NEXT_PUBLIC_FIREBASE_PROJECT_ID=NEXT_PUBLIC_FIREBASE_PROJECT_ID:latest,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:latest,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:latest,NEXT_PUBLIC_FIREBASE_APP_ID=NEXT_PUBLIC_FIREBASE_APP_ID:latest,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:latest,NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest,NEXT_PUBLIC_SENTRY_DSN=NEXT_PUBLIC_SENTRY_DSN:latest,NEXT_PUBLIC_POSTHOG_KEY=NEXT_PUBLIC_POSTHOG_KEY:latest,NEXT_PUBLIC_POSTHOG_HOST=NEXT_PUBLIC_POSTHOG_HOST:latest,NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN=NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN:latest'

# Define secrets from Secret Manager
availableSecrets:
  secretManager:
    # Firebase Client-side (NEXT_PUBLIC variables)
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_API_KEY/versions/latest
      env: NEXT_PUBLIC_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN/versions/latest
      env: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_PROJECT_ID/versions/latest
      env: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET/versions/latest
      env: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_APP_ID/versions/latest
      env: NEXT_PUBLIC_FIREBASE_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID/versions/latest
      env: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID

    # Database
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

    # Application
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_APP_URL/versions/latest
      env: NEXT_PUBLIC_APP_URL

    # Monitoring (Optional)
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SENTRY_DSN/versions/latest
      env: NEXT_PUBLIC_SENTRY_DSN
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_POSTHOG_KEY/versions/latest
      env: NEXT_PUBLIC_POSTHOG_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_POSTHOG_HOST/versions/latest
      env: NEXT_PUBLIC_POSTHOG_HOST
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN/versions/latest
      env: NEXT_PUBLIC_BETTER_STACK_SOURCE_TOKEN

# Build options
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

# Timeout for entire build (20 minutes)
timeout: 1200s

# Images to store in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/storycare-app:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/storycare-app:latest'
